<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>现金流规划助手 · 客户档案</title>
<link rel="stylesheet" href="assets/style.css"/>
</head>
<body>

<nav class="nav">
  <a class="nav-brand" href="index.html">
    <div class="nav-logo">💎</div>
    <span class="nav-title">现金流规划助手</span>
  </a>
  <div class="nav-links">
    <a class="nav-link" data-page="index" href="index.html">🏠 首页</a>
    <a class="nav-link active" data-page="clients" href="clients.html">📋 客户档案</a>
    <a class="nav-link" data-page="planner" href="planner.html">📊 开始分析</a>
    <a class="nav-link" data-page="scenarios" href="scenarios.html">🔮 场景模拟</a>
    <a class="nav-link" href="portfolio.html">📊 投资组合</a>
    <a class="nav-link" href="insurance.html">🛡️ 保险分析</a>
    <a class="nav-link" href="retirement.html">🏖️ 退休规划</a>
  </div>
</nav>

<div class="main" style="max-width:1000px">

  <!-- 页面头部 -->
  <div class="page-header" style="margin-bottom:24px">
    <div class="page-title">客户档案管理</div>
    <div class="page-sub">管理所有客户的财务分析记录</div>
  </div>

  <!-- 操作按钮栏 -->
  <div class="card" style="margin-bottom:20px">
    <div style="display:flex;gap:12px;flex-wrap:wrap">
      <button class="btn btn-gold" onclick="location.href='planner.html'">➕ 新建客户</button>
      <button class="btn btn-ghost" onclick="exportAllData()">📤 导出数据</button>
      <button class="btn btn-ghost" onclick="document.getElementById('import-input').click()">📥 导入数据</button>
      <button class="btn btn-ghost" onclick="clearAllData()" style="color:var(--red)">🗑️ 清空数据</button>
      <input type="file" id="import-input" accept=".json" style="display:none" onchange="handleImport(this)">
    </div>
  </div>

  <!-- 搜索栏 -->
  <div class="card" style="margin-bottom:20px">
    <div class="frow">
      <div class="fg" style="flex:1">
        <label>🔍 搜索客户</label>
        <div class="unit" style="display:flex;gap:10px">
          <input type="text" id="search-input" placeholder="输入姓名或ID搜索..." style="width:100%" onkeyup="searchClients()">
          <select id="sort-select" onchange="renderClientList()" style="width:150px">
            <option value="updated">最近更新</option>
            <option value="created">创建时间</option>
            <option value="name">姓名</option>
            <option value="score">评分高低</option>
            <option value="assets">资产规模</option>
          </select>
        </div>
      </div>
      <div class="fg" style="width:120px">
        <label>统计</label>
        <div style="padding:10px;background:var(--dark3);border-radius:8px;font-size:13px;color:var(--text2)">
          共 <strong id="client-count">0</strong> 位客户
        </div>
      </div>
    </div>
  </div>

  <!-- 客户列表 -->
  <div id="client-list" style="display:flex;flex-direction:column;gap:16px">
    <!-- 动态生成 -->
  </div>

</div>

<script src="assets/app.js"></script>
<script src="assets/storage.js"></script>
<script>
initNav('clients');

// ── HTML 转义函数 ─────────────────────────
function escapeHtml(text) {
  if (!text) return '';
  const map = {
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#039;'
  };
  return text.replace(/[&<>"']/g, m => map[m]);
}

// ── 渲染客户列表 ─────────────────────────────
function renderClientList(clients = null) {
  const list = el('client-list');

  if (!clients) {
    clients = loadAllClients();
  }

  // 应用搜索过滤
  const searchTerm = v('search-input').toLowerCase().trim();
  if (searchTerm) {
    clients = clients.filter(c =>
      c.name.toLowerCase().includes(searchTerm) ||
      c.id.toLowerCase().includes(searchTerm)
    );
  }

  // 排序
  const sortType = v('sort-select');
  clients.sort((a, b) => {
    switch(sortType) {
      case 'created':
        return new Date(b.createdAt) - new Date(a.createdAt);
      case 'name':
        return a.name.localeCompare(b.name);
      case 'score':
        return (b.derived?.scores?.total || 0) - (a.derived?.scores?.total || 0);
      case 'assets':
        return (b.derived?.totalAssets || 0) - (a.derived?.totalAssets || 0);
      case 'updated':
      default:
        return new Date(b.updatedAt) - new Date(a.updatedAt);
    }
  });

  // 更新计数
  el('client-count').textContent = clients.length;

  // 渲染列表
  if (clients.length === 0) {
    list.innerHTML = `
      <div style="text-align:center;padding:60px 20px;color:var(--text2)">
        <div style="font-size:48px;margin-bottom:16px">📋</div>
        <div style="font-size:16px;margin-bottom:8px">${searchTerm ? '未找到匹配的客户' : '暂无客户档案'}</div>
        <div style="font-size:13px">${searchTerm ? '请尝试其他关键词' : '点击"新建客户"开始创建'}</div>
      </div>
    `;
    return;
  }

  list.innerHTML = clients.map(client => {
    const d = client.derived || {};
    const c = d.currency || 'USD';
    const scoreColor = d.scores?.total >= 80 ? 'var(--green)' : d.scores?.total >= 60 ? 'var(--gold)' : 'var(--red)';
    const scoreLabel = d.scores?.label || '未分析';

    return `
      <div class="card gb" style="cursor:pointer;transition:transform 0.2s,box-shadow 0.2s"
           onmouseenter="this.style.transform='translateY(-2px)';this.style.boxShadow='0 4px 12px rgba(0,0,0,0.15)'"
           onmouseleave="this.style.transform='';this.style.boxShadow=''">
        <div style="display:flex;gap:20px">
          <!-- 左侧：基本信息 -->
          <div style="flex:1">
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">
              <div style="font-size:20px;font-weight:700;color:var(--text)">${client.name}</div>
              <span style="font-size:12px;color:var(--text2);background:var(--dark3);padding:2px 8px;border-radius:4px">
                ${client.age || '--'} 岁
              </span>
              <span style="font-size:12px;color:var(--text2);background:var(--dark3);padding:2px 8px;border-radius:4px">
                ${riskLabel(d.riskPref) || '--'}
              </span>
            </div>
            <div style="font-size:12px;color:var(--text2);margin-bottom:12px">
              <span style="margin-right:16px">📅 创建：${formatDate(client.createdAt)}</span>
              <span>🕒 更新：${timeAgo(client.updatedAt)}</span>
            </div>

            <!-- 关键指标 -->
            <div class="grid3" style="margin-bottom:12px">
              <div>
                <div style="font-size:11px;color:var(--text2);margin-bottom:4px">综合评分</div>
                <div style="font-size:18px;font-weight:700;color:${scoreColor}">
                  ${d.scores?.total || '--'} <span style="font-size:12px;font-weight:400">/ 100</span>
                </div>
                <div style="font-size:11px;color:${scoreColor}">${scoreLabel}</div>
              </div>
              <div>
                <div style="font-size:11px;color:var(--text2);margin-bottom:4px">总资产</div>
                <div style="font-size:18px;font-weight:700;color:var(--gold)">${fmt(d.totalAssets, c)}</div>
                <div style="font-size:11px;color:var(--text2)">月结余 ${fmt(d.monthlySurplus, c)}</div>
              </div>
              <div>
                <div style="font-size:11px;color:var(--text2);margin-bottom:4px">储蓄率</div>
                <div style="font-size:18px;font-weight:700;color:${d.savingsRate >= 0.2 ? 'var(--green)' : 'var(--gold)'}">
                  ${(d.savingsRate * 100).toFixed(1)}%
                </div>
                <div style="font-size:11px;color:var(--text2)">距退休 ${d.yearsToRetire || '--'} 年</div>
              </div>
            </div>

            <!-- 分析入口按钮 -->
            <div style="display:flex;gap:8px;flex-wrap:wrap">
              <button class="btn btn-gold" style="padding:8px 16px;font-size:13px"
                      data-id="${client.id}" onclick="event.stopPropagation();loadAndEdit(this.dataset.id)">
                ✏️ 编辑档案
              </button>
              <button class="btn btn-outline" style="padding:8px 16px;font-size:13px"
                      data-id="${client.id}" onclick="event.stopPropagation();openAnalysis('portfolio', this.dataset.id)">
                📊 投资组合
                ${client.analyses?.portfolio ? '<span style="margin-left:4px;color:var(--green)">✓</span>' : ''}
              </button>
              <button class="btn btn-outline" style="padding:8px 16px;font-size:13px"
                      data-id="${client.id}" onclick="event.stopPropagation();openAnalysis('insurance', this.dataset.id)">
                🛡️ 保险分析
                ${client.analyses?.insurance ? '<span style="margin-left:4px;color:var(--green)">✓</span>' : ''}
              </button>
              <button class="btn btn-outline" style="padding:8px 16px;font-size:13px"
                      data-id="${client.id}" onclick="event.stopPropagation();openAnalysis('scenarios', this.dataset.id)">
                🔮 场景模拟
              </button>
            </div>
          </div>

          <!-- 右侧：快速预览 -->
          <div style="width:180px;padding-left:20px;border-left:1px solid var(--border2)">
            <div style="font-size:11px;color:var(--text2);margin-bottom:8px">资产配置</div>
            ${renderAssetPreview(d, c)}
          </div>
        </div>
      </div>
    `;
  }).join('');
}

// ── 渲染资产预览 ─────────────────────────────
function renderAssetPreview(d, currency) {
  const assets = [
    { key: 'cash', name: '现金', val: d.cash, color: '#4d8fff' },
    { key: 'savingsPlan', name: '储蓄险', val: d.savingsPlan, color: '#3ecf8e' },
    { key: 'trust', name: '信托', val: d.trust, color: '#8b5cf6' },
    { key: 'property', name: '房产', val: d.property, color: '#f59e0b' },
    { key: 'stocks', name: '股票', val: d.stocks, color: '#e05555' },
    { key: 'gold', name: '黄金', val: d.gold, color: '#c9a84c' },
  ].filter(a => a.val > 0);

  if (assets.length === 0) {
    return '<div style="font-size:12px;color:var(--text3)">暂无资产数据</div>';
  }

  const total = d.totalAssets || 1;
  return assets.map(a => {
    const pct = ((a.val / total) * 100).toFixed(0);
    return `
      <div style="margin-bottom:6px">
        <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:2px">
          <span>${a.name}</span>
          <span>${pct}%</span>
        </div>
        <div style="height:4px;background:var(--dark);border-radius:99px;overflow:hidden">
          <div style="height:100%;width:${pct}%;background:${a.color};border-radius:99px"></div>
        </div>
      </div>
    `;
  }).join('');
}

// ── 风险偏好标签 ─────────────────────────────
function riskLabel(pref) {
  const labels = {
    conservative: '保守',
    moderate: '稳健',
    growth: '成长',
    aggressive: '激进'
  };
  return labels[pref] || '--';
}

// ── 搜索客户 ─────────────────────────────────
function searchClients() {
  renderClientList();
}

// ── 打开分析页面 ──────────────────────────────
function openAnalysis(type, clientId) {
  // 保存当前选择的客户ID到 sessionStorage
  sessionStorage.setItem('selectedClientId', clientId);
  
  // 根据类型跳转到对应页面
  const pages = {
    portfolio: 'portfolio.html',
    insurance: 'insurance.html',
    scenarios: 'scenarios.html'
  };
  
  if (pages[type]) {
    location.href = pages[type];
  }
}

// ── 加载并编辑客户 ───────────────────────────
function loadAndEdit(clientId) {
  // 保存当前选择的客户ID到 sessionStorage
  sessionStorage.setItem('selectedClientId', clientId);
  // 跳转到 planner 页面
  location.href = 'planner.html';
}

// ── 查看历史记录 ─────────────────────────────
function viewHistory(clientId) {
  const history = loadClientHistory(clientId);
  if (history.length === 0) {
    toast('该客户暂无历史记录', 'warn');
    return;
  }

  // 创建历史记录弹窗
  const modal = document.createElement('div');
  modal.style.cssText = `
    position:fixed;top:0;left:0;right:0;bottom:0;
    background:rgba(0,0,0,0.7);z-index:1000;
    display:flex;align-items:center;justify-content:center;
  `;

  const content = document.createElement('div');
  content.style.cssText = `
    background:var(--card);border-radius:16px;
    max-width:900px;width:90%;max-height:80vh;
    overflow-y:auto;padding:24px;
  `;

  const client = loadClientData(clientId);
  if (!client) {
    content.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text2)">未找到该客户</div>';
    modal.appendChild(content);
    document.body.appendChild(modal);
    modal.onclick = function(e) {
      if (e.target === modal) modal.remove();
    };
    return;
  }
  
  content.innerHTML = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px"><div><div style="font-size:18px;font-weight:700;margin-bottom:4px">&#128221; ' + client.name + ' 的历史记录</div><div style="font-size:13px;color:var(--text2)">共 ' + history.length + ' 条记录</div></div><button class="history-close-btn" style="background:var(--dark);border:none;color:var(--text2);padding:8px 16px;border-radius:8px;cursor:pointer">关闭</button></div>';

  var historyHtml = '';
  var reversedHistory = history.slice().reverse();
  for (var i = 0; i < reversedHistory.length; i++) {
    var h = reversedHistory[i];
    var d = h.derived || {};
    var score = d.scores ? d.scores.total : '--';
    var totalAssets = d.totalAssets || 0;
    var currency = d.currency || 'CNY';
    var savingsRate = ((d.savingsRate || 0) * 100).toFixed(1);
    historyHtml += '<div style="padding:16px;background:var(--dark2);border-radius:12px;margin-bottom:12px"><div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="font-size:13px;color:var(--text2)">' + formatDate(h.createdAt) + '</span><span style="font-size:13px;font-weight:700;color:var(--gold)">评分：' + score + ' 分</span></div><div style="font-size:12px;color:var(--text3);margin-bottom:8px">资产：' + fmt(totalAssets, currency) + ' · 储蓄率：' + savingsRate + '%</div><div style="font-size:11px;color:var(--text2)">' + timeAgo(h.createdAt) + '</div></div>';
  }
  content.innerHTML += historyHtml;

  modal.appendChild(content);
  // 使用事件委托
  modal.onclick = function(e) {
    if (e.target.classList.contains('history-close-btn') || e.target === modal) {
      modal.remove();
    }
  };
  document.body.appendChild(modal);
}

// ── 确认删除客户 ─────────────────────────────
function confirmDelete(clientId, clientName) {
  if (confirm(`确定要删除客户「${clientName}」吗？\n\n此操作将同时删除该客户的所有历史记录，且不可恢复！`)) {
    if (deleteClient(clientId)) {
      renderClientList();
    }
  }
}

// ── 处理导入 ─────────────────────────────────
function handleImport(input) {
  const file = input.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const count = importData(e.target.result);
      if (count > 0) {
        renderClientList();
      }
    } catch (error) {
      toast('导入失败：文件格式错误', 'error');
    }
  };
  reader.readAsText(file);
  input.value = ''; // 重置 input
}

// ── 页面加载时渲染列表 ─────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  renderClientList();
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>现金流规划助手 · 历史对比</title>
<link rel="stylesheet" href="assets/style.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

<nav class="nav">
  <a class="nav-brand" href="index.html">
    <div class="nav-logo">💎</div>
    <span class="nav-title">现金流规划助手</span>
  </a>
  <div class="nav-links">
    <a class="nav-link" data-page="index" href="index.html">🏠 首页</a>
    <a class="nav-link" data-page="clients" href="clients.html">📋 客户档案</a>
    <a class="nav-link active" data-page="comparison" href="comparison.html">📈 历史对比</a>
    <a class="nav-link" data-page="planner" href="planner.html">📊 开始分析</a>
    <a class="nav-link" data-page="monthly" href="monthly.html">📅 月度对账</a>
    <a class="nav-link" data-page="scenarios" href="scenarios.html">🔮 场景模拟</a>
    <a class="nav-link" href="portfolio.html">📊 投资组合</a>
    <a class="nav-link" href="insurance.html">🛡️ 保险分析</a>
    <a class="nav-link" href="retirement.html">🏖️ 退休规划</a>
  </div>
</nav>

<div class="main" style="max-width:1200px">

  <!-- 页面头部 -->
  <div class="page-header" style="margin-bottom:24px">
    <div class="page-title">历史对比分析</div>
    <div class="page-sub">对比客户不同时期的财务健康变化</div>
  </div>

  <!-- 第一步：选择客户 -->
  <div id="step1" class="card gb" style="margin-bottom:24px">
    <div class="card-title"><span class="ico">👤</span> 选择客户</div>
    <div class="frow">
      <div class="fg" style="flex:1">
        <label>客户选择</label>
        <select id="client-select" onchange="onLoadClientHistory()">
          <option value="">-- 请选择客户 --</option>
        </select>
      </div>
      <div class="fg" style="width:150px">
        <label>历史记录数</label>
        <div style="padding:10px;background:var(--dark3);border-radius:8px;font-size:13px;color:var(--text2)">
          共 <strong id="history-count">0</strong> 条
        </div>
      </div>
    </div>
  </div>

  <!-- 第二步：选择对比记录 -->
  <div id="step2" class="card gb" style="margin-bottom:24px;display:none">
    <div class="card-title"><span class="ico">📅</span> 选择对比记录</div>
    <div class="grid2" style="margin-bottom:16px">
      <div>
        <label>对比起点（较早）</label>
        <select id="compare-earlier" onchange="updateCompareButton()">
          <option value="">-- 请选择 --</option>
        </select>
      </div>
      <div>
        <label>对比终点（较晚）</label>
        <select id="compare-later" onchange="updateCompareButton()">
          <option value="">-- 请选择 --</option>
        </select>
      </div>
    </div>
    <div style="text-align:center">
      <button class="btn btn-gold" id="compare-btn" onclick="generateComparison()" disabled>
        📊 生成对比报告
      </button>
    </div>
  </div>

  <!-- 第三步：对比结果 -->
  <div id="step3" style="display:none">
    <!-- 客户信息卡片 -->
    <div class="card gb" style="margin-bottom:24px;padding:24px;background:linear-gradient(135deg,rgba(201,168,76,0.08),rgba(201,168,76,0.02))">
      <div style="text-align:center">
        <div style="font-size:11px;color:var(--text2);margin-bottom:6px;letter-spacing:1px">历史对比分析报告</div>
        <div style="font-size:24px;font-weight:800;margin-bottom:4px" id="client-name">客户姓名</div>
        <div style="font-size:13px;color:var(--text2)" id="compare-period">对比周期</div>
      </div>
    </div>

    <!-- 进步概览 -->
    <div class="card gb" style="margin-bottom:24px">
      <div class="card-title"><span class="ico">🎯</span> 进步概览</div>
      <div id="progress-overview" style="padding:20px">
        <!-- 动态生成 -->
      </div>
    </div>

    <!-- 评分对比 -->
    <div class="card gb" style="margin-bottom:24px">
      <div class="card-title"><span class="ico">📈</span> 评分对比</div>
      <div class="grid2" style="margin-bottom:20px">
        <div id="score-earlier">
          <!-- 动态生成 -->
        </div>
        <div id="score-later">
          <!-- 动态生成 -->
        </div>
      </div>
      <div id="score-change">
        <!-- 动态生成 -->
      </div>
    </div>

    <!-- 关键指标对比 -->
    <div class="card gb" style="margin-bottom:24px">
      <div class="card-title"><span class="ico">📊</span> 关键指标对比</div>
      <div id="metrics-comparison">
        <!-- 动态生成 -->
      </div>
    </div>

    <!-- 资产配置对比 -->
    <div class="card gb" style="margin-bottom:24px">
      <div class="card-title"><span class="ico">🏗️</span> 资产配置对比</div>
      <div class="grid2">
        <div id="asset-earlier">
          <!-- 动态生成 -->
        </div>
        <div id="asset-later">
          <!-- 动态生成 -->
        </div>
      </div>
      <div id="asset-change" style="margin-top:20px">
        <!-- 动态生成 -->
      </div>
    </div>

    <!-- 收支对比 -->
    <div class="card gb" style="margin-bottom:24px">
      <div class="card-title"><span class="ico">💰</span> 收支对比</div>
      <div id="income-expense-comparison">
        <!-- 动态生成 -->
      </div>
    </div>

    <!-- 变化趋势图 -->
    <div class="card gb" style="margin-bottom:24px">
      <div class="card-title"><span class="ico">📉</span> 变化趋势</div>
      <div id="trend-charts">
        <!-- 动态生成 -->
      </div>
    </div>

    <!-- 操作按钮 -->
    <div style="display:flex;justify-content:flex-end;gap:12px;margin-top:24px;padding-top:24px;border-top:1px solid var(--border2)">
      <button class="btn btn-ghost" onclick="location.href='comparison.html'">重新选择</button>
      <button class="btn btn-gold" onclick="downloadComparisonPDF()">📄 下载对比报告</button>
    </div>
  </div>

</div>

<script src="assets/app.js"></script>
<script src="assets/storage.js"></script>
<script>
initNav('comparison');

// ── 全局变量 ───────────────────────────────
let currentClient = null;
let currentHistory = [];
let earlierRecord = null;
let laterRecord = null;

// ── 初始化：加载所有客户 ───────────────────────
document.addEventListener('DOMContentLoaded', () => {
  const clients = loadAllClients();
  const select = el('client-select');

  clients.forEach(client => {
    const option = document.createElement('option');
    option.value = client.id;
    option.textContent = `${client.name} (${timeAgo(client.updatedAt)})`;
    select.appendChild(option);
  });

  if (clients.length === 0) {
    toast('暂无客户档案，请先创建客户', 'warn');
  }
});

// ── 加载客户历史记录 ─────────────────────────
function onLoadClientHistory() {
  const clientId = v('client-select');
  if (!clientId) {
    el('step2').style.display = 'none';
    el('step3').style.display = 'none';
    el('history-count').textContent = '0';
    return;
  }

  currentClient = loadClientData(clientId);
  currentHistory = loadClientHistoryRecords(clientId);

  el('history-count').textContent = currentHistory.length;

  if (currentHistory.length < 2) {
    toast('该客户的历史记录不足 2 条，无法对比', 'warn');
    el('step2').style.display = 'none';
    el('step3').style.display = 'none';
    return;
  }

  // 填充历史记录下拉框
  const earlierSelect = el('compare-earlier');
  const laterSelect = el('compare-later');

  earlierSelect.innerHTML = '<option value="">-- 请选择 --</option>';
  laterSelect.innerHTML = '<option value="">-- 请选择 --</option>';

  currentHistory.forEach((record, index) => {
    const dateStr = formatDate(record.createdAt);
    const option = document.createElement('option');
    option.value = index;
    option.textContent = `${dateStr} - 评分：${record.derived?.scores?.total || '--'} 分`;
    option.dataset.date = dateStr;

    earlierSelect.appendChild(option.cloneNode(true));
    laterSelect.appendChild(option);
  });

  // 默认选择最早和最新的记录
  earlierSelect.value = 0;
  laterSelect.value = currentHistory.length - 1;

  el('step2').style.display = 'block';
  el('step3').style.display = 'none';

  updateCompareButton();
}

// ── 更新对比按钮状态 ─────────────────────────
function updateCompareButton() {
  const earlier = el('compare-earlier');
  const later = el('compare-later');
  const btn = el('compare-btn');

  if (earlier.value !== '' && later.value !== '') {
    btn.disabled = false;
  } else {
    btn.disabled = true;
  }
}

// ── 生成对比报告 ─────────────────────────────
function generateComparison() {
  const earlierIndex = parseInt(el('compare-earlier').value);
  const laterIndex = parseInt(el('compare-later').value);

  if (earlierIndex === laterIndex) {
    toast('请选择不同的历史记录进行对比', 'warn');
    return;
  }

  // 确保较早的记录在前
  if (earlierIndex > laterIndex) {
    earlierRecord = currentHistory[laterIndex];
    laterRecord = currentHistory[earlierIndex];
  } else {
    earlierRecord = currentHistory[earlierIndex];
    laterRecord = currentHistory[laterIndex];
  }

  // 计算时间差
  const earlierDate = new Date(earlierRecord.createdAt);
  const laterDate = new Date(laterRecord.createdAt);
  const daysDiff = Math.floor((laterDate - earlierDate) / (1000 * 60 * 60 * 24));
  const monthsDiff = Math.floor(daysDiff / 30);

  // 更新客户信息
  el('client-name').textContent = currentClient.name;
  el('compare-period').textContent = `对比周期：${formatDate(earlierRecord.createdAt)} → ${formatDate(laterRecord.createdAt)}（约 ${monthsDiff} 个月）`;

  // 渲染各个对比模块
  renderProgressOverview();
  renderScoreComparison();
  renderMetricsComparison();
  renderAssetComparison();
  renderIncomeExpenseComparison();
  renderTrendCharts();

  // 显示结果
  el('step3').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });

  toast('对比报告已生成');
}

// ── 渲染进步概览 ───────────────────────────
function renderProgressOverview() {
  const d1 = earlierRecord.derived;
  const d2 = laterRecord.derived;

  const scoreChange = d2.scores.total - d1.scores.total;
  const assetChange = d2.totalAssets - d1.totalAssets;
  const savingsRateChange = (d2.savingsRate - d1.savingsRate) * 100;
  const passiveIncomeChange = (d2.passiveRatio - d1.passiveRatio) * 100;

  const improvements = [];

  if (scoreChange > 0) {
    improvements.push({
      icon: '📈',
      title: '评分提升',
      value: `+${scoreChange} 分`,
      color: 'var(--green)'
    });
  }

  if (assetChange > 0) {
    improvements.push({
      icon: '💰',
      title: '资产增长',
      value: `+${fmt(assetChange, d2.currency)}`,
      color: 'var(--gold)'
    });
  }

  if (savingsRateChange > 0) {
    improvements.push({
      icon: '📊',
      title: '储蓄率提升',
      value: `+${savingsRateChange.toFixed(1)}%`,
      color: 'var(--blue)'
    });
  }

  if (passiveIncomeChange > 0) {
    improvements.push({
      icon: '🎯',
      title: '被动收入占比提升',
      value: `+${passiveIncomeChange.toFixed(1)}%`,
      color: 'var(--purple)'
    });
  }

  const html = `
    ${improvements.length > 0 ? `
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px">
        ${improvements.map(imp => `
          <div style="padding:16px;background:${imp.color}20;border:1px solid ${imp.color}40;border-radius:12px;text-align:center">
            <div style="font-size:32px;margin-bottom:8px">${imp.icon}</div>
            <div style="font-size:13px;color:var(--text2);margin-bottom:4px">${imp.title}</div>
            <div style="font-size:20px;font-weight:700;color:${imp.color}">${imp.value}</div>
          </div>
        `).join('')}
      </div>
    ` : `
      <div style="padding:20px;background:var(--dark2);border-radius:12px;text-align:center">
        <div style="font-size:32px;margin-bottom:12px">📊</div>
        <div style="font-size:14px;color:var(--text2)">各项指标保持稳定</div>
        <div style="font-size:12px;color:var(--text3);margin-top:4px">继续保持良好的财务习惯</div>
      </div>
    `}
  `;

  el('progress-overview').innerHTML = html;
}

// ── 渲染评分对比 ─────────────────────────────
function renderScoreComparison() {
  const d1 = earlierRecord.derived;
  const d2 = laterRecord.derived;

  const renderScoreCard = (d, label) => `
    <div style="padding:20px;background:var(--dark2);border-radius:12px;text-align:center">
      <div style="font-size:12px;color:var(--text2);margin-bottom:12px">${label}</div>
      <div style="width:100px;height:100px;margin:0 auto;border-radius:50%;background:conic-gradient(${d.scores.color} ${d.scores.total}%, #e8e4dc ${d.scores.total}%);display:flex;align-items:center;justify-content:center;margin-bottom:12px">
        <div style="width:80px;height:80px;background:var(--card);border-radius:50%;display:flex;align-items:center;justify-content:center">
          <div style="font-size:28px;font-weight:800;color:${d.scores.color}">${d.scores.total}</div>
        </div>
      </div>
      <div style="font-size:14px;color:${d.scores.color};font-weight:600">${d.scores.label}</div>
    </div>
  `;

  const scoreChange = d2.scores.total - d1.scores.total;
  const changeHtml = `
    <div style="padding:16px;background:${scoreChange >= 0 ? 'rgba(62,207,142,0.08)' : 'rgba(224,85,85,0.08)'};border:1px solid ${scoreChange >= 0 ? 'rgba(62,207,142,0.2)' : 'rgba(224,85,85,0.2)'};border-radius:12px;text-align:center">
      <div style="font-size:12px;color:var(--text2);margin-bottom:8px">评分变化</div>
      <div style="font-size:24px;font-weight:700;color:${scoreChange >= 0 ? 'var(--green)' : 'var(--red)'}">
        ${scoreChange >= 0 ? '+' : ''}${scoreChange} 分
      </div>
      <div style="font-size:12px;color:var(--text3);margin-top:4px">
        ${scoreChange >= 0 ? '🎉 进步显著！' : '⚠️ 需要关注'}
      </div>
    </div>
  `;

  el('score-earlier').innerHTML = renderScoreCard(d1, formatDate(earlierRecord.createdAt));
  el('score-later').innerHTML = renderScoreCard(d2, formatDate(laterRecord.createdAt));
  el('score-change').innerHTML = changeHtml;
}

// ── 渲染关键指标对比 ─────────────────────────
function renderMetricsComparison() {
  const d1 = earlierRecord.derived;
  const d2 = laterRecord.derived;
  const c = d2.currency;

  const metrics = [
    { key: 'totalAssets', name: '总资产', format: v => fmt(v, c) },
    { key: 'monthlySurplus', name: '月度结余', format: v => fmt(v, c) },
    { key: 'savingsRate', name: '储蓄率', format: v => (v * 100).toFixed(1) + '%' },
    { key: 'debtRatio', name: '债务比率', format: v => (v * 100).toFixed(1) + '%' },
    { key: 'passiveRatio', name: '被动收入占比', format: v => (v * 100).toFixed(1) + '%' },
    { key: 'emergencyCoverage', name: '紧急预备金覆盖', format: v => (v * 100).toFixed(0) + '%' },
  ];

  const html = metrics.map(m => {
    const v1 = d1[m.key];
    const v2 = d2[m.key];
    const change = v2 - v1;
    const changePct = v1 !== 0 ? ((change / Math.abs(v1)) * 100).toFixed(1) : 0;
    const isPositive = m.key === 'savingsRate' || m.key === 'passiveRatio' || m.key === 'emergencyCoverage' ?
      change >= 0 : change >= 0; // 债务比率降低是好事

    const displayChange = (Math.abs(changePct) > 0.1) ? `(${change >= 0 ? '+' : ''}${changePct}%)` : '';

    return `
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;padding:12px;background:var(--dark2);border-radius:10px">
        <div style="width:120px;font-size:13px;color:var(--text3);flex-shrink:0">${m.name}</div>
        <div style="flex:1;text-align:center;font-size:14px;font-weight:600;color:var(--text)">
          ${m.format(v1)}
        </div>
        <div style="flex:0 0 30px;text-align:center">
          <span style="font-size:18px;color:${isPositive ? 'var(--green)' : 'var(--red)'}">
            ${isPositive ? '→' : '↘'}
          </span>
        </div>
        <div style="flex:1;text-align:center;font-size:14px;font-weight:700;color:var(--gold)">
          ${m.format(v2)}
        </div>
        <div style="flex:0 0 80px;text-align:right;font-size:12px;color:${isPositive ? 'var(--green)' : 'var(--red)'};font-weight:600">
          ${displayChange}
        </div>
      </div>
    `;
  }).join('');

  el('metrics-comparison').innerHTML = html;
}

// ── 渲染资产配置对比 ─────────────────────────
function renderAssetComparison() {
  const d1 = earlierRecord.derived;
  const d2 = laterRecord.derived;
  const c = d2.currency;

  const renderAsset = (d, title) => {
    const assets = [
      { key: 'cash', name: '现金', val: d.cash, color: '#4d8fff' },
      { key: 'savingsPlan', name: '储蓄险', val: d.savingsPlan, color: '#3ecf8e' },
      { key: 'trust', name: '信托', val: d.trust, color: '#8b5cf6' },
      { key: 'property', name: '房产', val: d.property, color: '#f59e0b' },
      { key: 'stocks', name: '股票', val: d.stocks, color: '#e05555' },
      { key: 'gold', name: '黄金', val: d.gold, color: '#c9a84c' },
    ].filter(a => a.val > 0);

    const total = d.totalAssets || 1;

    return `
      <div style="padding:16px;background:var(--dark2);border-radius:12px">
        <div style="font-size:12px;color:var(--text2);margin-bottom:12px;text-align:center">${title}</div>
        <div style="font-size:14px;text-align:center;margin-bottom:12px;color:var(--gold);font-weight:600">
          总计：${fmt(total, c)}
        </div>
        ${assets.map(a => {
          const pct = ((a.val / total) * 100).toFixed(0);
          return `
            <div style="margin-bottom:8px">
              <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text3);margin-bottom:2px">
                <span>${a.name}</span>
                <span>${pct}% · ${fmt(a.val, c)}</span>
              </div>
              <div style="height:6px;background:var(--dark);border-radius:99px;overflow:hidden">
                <div style="height:100%;width:${pct}%;background:${a.color};border-radius:99px"></div>
              </div>
            </div>
          `;
        }).join('')}
      </div>
    `;
  };

  // 资产变化
  const assetChanges = [];
  const assets = ['cash', 'savingsPlan', 'trust', 'property', 'stocks', 'gold'];
  assets.forEach(key => {
    const change = d2[key] - d1[key];
    if (change !== 0) {
      const nameMap = { cash: '现金', savingsPlan: '储蓄险', trust: '信托', property: '房产', stocks: '股票', gold: '黄金' };
      assetChanges.push({
        name: nameMap[key],
        change: change,
        pct: d1[key] !== 0 ? ((change / d1[key]) * 100).toFixed(1) : Infinity
      });
    }
  });

  const changeHtml = assetChanges.length > 0 ? `
    <div style="padding:16px;background:var(--dark2);border-radius:12px">
      <div style="font-size:12px;color:var(--text2);margin-bottom:12px">资产变化</div>
      ${assetChanges.map(a => {
        const isIncrease = a.change > 0;
        const pctDisplay = a.pct === Infinity ? '新增' : `${a.pct}%`;
        return `
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;padding:8px;background:var(--dark3);border-radius:8px">
            <span style="font-size:12px;color:var(--text3)">${a.name}</span>
            <span style="font-size:13px;font-weight:600;color:${isIncrease ? 'var(--green)' : 'var(--red)'}">
              ${isIncrease ? '+' : ''}${fmt(a.change, c)} (${pctDisplay})
            </span>
          </div>
        `;
      }).join('')}
    </div>
  ` : '<div style="padding:16px;background:var(--dark2);border-radius:12px;text-align:center;color:var(--text3)">资产配置无明显变化</div>';

  el('asset-earlier').innerHTML = renderAsset(d1, formatDate(earlierRecord.createdAt));
  el('asset-later').innerHTML = renderAsset(d2, formatDate(laterRecord.createdAt));
  el('asset-change').innerHTML = changeHtml;
}

// ── 渲染收支对比 ─────────────────────────────
function renderIncomeExpenseComparison() {
  const d1 = earlierRecord.derived;
  const d2 = laterRecord.derived;
  const c = d2.currency;

  const html = `
    <div class="grid2">
      <div style="padding:20px;background:rgba(62,207,142,0.08);border:1px solid rgba(62,207,142,0.2);border-radius:12px">
        <div style="font-size:12px;color:var(--text2);margin-bottom:8px">月度总收入</div>
        <div style="display:flex;align-items:center;gap:16px">
          <div>
            <div style="font-size:13px;color:var(--text3);margin-bottom:4px">之前</div>
            <div style="font-size:20px;font-weight:700;color:var(--text)">${fmt(d1.totalIncome, c)}</div>
          </div>
          <div style="font-size:24px;color:var(--green)">→</div>
          <div>
            <div style="font-size:13px;color:var(--text3);margin-bottom:4px">现在</div>
            <div style="font-size:20px;font-weight:700;color:var(--gold)">${fmt(d2.totalIncome, c)}</div>
          </div>
        </div>
        <div style="margin-top:12px;font-size:13px;color:${d2.totalIncome >= d1.totalIncome ? 'var(--green)' : 'var(--red)'};font-weight:600">
          ${d2.totalIncome >= d1.totalIncome ? '↑' : '↓'} ${fmt(d2.totalIncome - d1.totalIncome, c)}
        </div>
      </div>

      <div style="padding:20px;background:rgba(224,85,85,0.08);border:1px solid rgba(224,85,85,0.2);border-radius:12px">
        <div style="font-size:12px;color:var(--text2);margin-bottom:8px">月度总支出</div>
        <div style="display:flex;align-items:center;gap:16px">
          <div>
            <div style="font-size:13px;color:var(--text3);margin-bottom:4px">之前</div>
            <div style="font-size:20px;font-weight:700;color:var(--text)">${fmt(d1.totalExp, c)}</div>
          </div>
          <div style="font-size:24px;color:${d2.totalExp <= d1.totalExp ? 'var(--green)' : 'var(--red)'}">→</div>
          <div>
            <div style="font-size:13px;color:var(--text3);margin-bottom:4px">现在</div>
            <div style="font-size:20px;font-weight:700;color:${d2.totalExp <= d1.totalExp ? 'var(--green)' : 'var(--red)'}">${fmt(d2.totalExp, c)}</div>
          </div>
        </div>
        <div style="margin-top:12px;font-size:13px;color:${d2.totalExp <= d1.totalExp ? 'var(--green)' : 'var(--red)'};font-weight:600">
          ${d2.totalExp <= d1.totalExp ? '↓' : '↑'} ${fmt(d2.totalExp - d1.totalExp, c)}
        </div>
      </div>
    </div>
  `;

  el('income-expense-comparison').innerHTML = html;
}

// ── 渲染变化趋势图 ───────────────────────────
function renderTrendCharts() {
  const d1 = earlierRecord.derived;
  const d2 = laterRecord.derived;

  const trends = [
    { key: 'scores.total', name: '综合评分', color: '#c9a84c' },
    { key: 'totalAssets', name: '总资产', color: '#3ecf8e' },
    { key: 'savingsRate', name: '储蓄率', color: '#4d8fff' },
    { key: 'passiveRatio', name: '被动收入占比', color: '#8b5cf6' },
  ];

  const html = trends.map(t => {
    const v1 = t.key.includes('.') ? t.key.split('.').reduce((o, k) => o?.[k], d1) : d1[t.key];
    const v2 = t.key.includes('.') ? t.key.split('.').reduce((o, k) => o?.[k], d2) : d2[t.key];

    // 归一化到 0-100
    const max = Math.max(v1, v2, 1);
    const min = Math.min(v1, v2, 0);
    const range = max - min || 1;
    const p1 = ((v1 - min) / range) * 100;
    const p2 = ((v2 - min) / range) * 100;

    return `
      <div style="margin-bottom:16px">
        <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text3);margin-bottom:8px">
          <span>${t.name}</span>
          <span>
            ${t.key === 'scores.total' ? v1 : t.key === 'savingsRate' || t.key === 'passiveRatio' ? (v1 * 100).toFixed(1) + '%' : fmt(v1, d2.currency)}
            →
            ${t.key === 'scores.total' ? v2 : t.key === 'savingsRate' || t.key === 'passiveRatio' ? (v2 * 100).toFixed(1) + '%' : fmt(v2, d2.currency)}
          </span>
        </div>
        <div style="height:40px;background:var(--dark2);border-radius:8px;position:relative;display:flex;align-items:center;justify-content:space-between;padding:0 16px">
          <!-- 趋势线 -->
          <svg style="position:absolute;top:0;left:0;right:0;bottom:0;z-index:1" viewBox="0 0 100 100" preserveAspectRatio="none">
            <defs>
              <linearGradient id="grad-${t.name}" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" style="stop-color:${t.color};stop-opacity:0.2" />
                <stop offset="100%" style="stop-color:${t.color};stop-opacity:0.6" />
              </linearGradient>
            </defs>
            <path d="M 0 ${100-p1} L 100 ${100-p2}" stroke="${t.color}" stroke-width="3" fill="none"/>
            <circle cx="0" cy="${100-p1}" r="6" fill="${t.color}"/>
            <circle cx="100" cy="${100-p2}" r="6" fill="${t.color}"/>
          </svg>
          <!-- 点标签 -->
          <div style="z-index:2;font-size:11px;color:${t.color};font-weight:600;background:var(--card);padding:2px 6px;border-radius:4px">
            ${t.key === 'scores.total' ? v1 : t.key === 'savingsRate' || t.key === 'passiveRatio' ? (v1 * 100).toFixed(1) + '%' : fmt(v1, d2.currency)}
          </div>
          <div style="z-index:2;font-size:11px;color:${t.color};font-weight:600;background:var(--card);padding:2px 6px;border-radius:4px">
            ${t.key === 'scores.total' ? v2 : t.key === 'savingsRate' || t.key === 'passiveRatio' ? (v2 * 100).toFixed(1) + '%' : fmt(v2, d2.currency)}
          </div>
        </div>
      </div>
    `;
  }).join('');

  el('trend-charts').innerHTML = html;
}

// ── 下载对比报告 PDF ─────────────────────────
function downloadComparisonPDF() {
  const element = document.getElementById('step3');
  const opt = {
    margin: 10,
    filename: `历史对比报告_${currentClient.name}_${new Date().toISOString().slice(0, 10)}.pdf`,
    image: { type: 'jpeg', quality: 0.95 },
    html2canvas: { scale: 2, useCORS: true, backgroundColor: '#ffffff' },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
    pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
  };

  toast('正在生成 PDF，请稍候...');
  html2pdf().set(opt).from(element).save().then(() => {
    toast('PDF 报告已生成');
  }).catch((err) => {
    console.error('PDF error:', err);
    toast('PDF 生成失败，请重试', 'error');
  });
}
</script>

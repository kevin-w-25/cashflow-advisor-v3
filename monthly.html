</head>
<body>

<nav class="nav">
  <a class="nav-brand" href="index.html">
    <div class="nav-logo">💎</div>
    <span class="nav-title">现金流规划助手</span>
  </a>
  <div class="nav-links">
    <a class="nav-link" data-page="index" href="index.html">🏠 首页</a>
    <a class="nav-link" data-page="clients" href="clients.html">📋 客户档案</a>
    <a class="nav-link" data-page="comparison" href="comparison.html">📈 历史对比</a>
    <a class="nav-link" data-page="planner" href="planner.html">📊 开始分析</a>
    <a class="nav-link active" data-page="monthly" href="monthly.html">📅 月度对账</a>
    <a class="nav-link" data-page="scenarios" href="scenarios.html">🔮 场景模拟</a>
    <a class="nav-link" href="portfolio.html">📊 投资组合</a>
    <a class="nav-link" href="insurance.html">🛡️ 保险分析</a>
    <a class="nav-link" href="retirement.html">🏖️ 退休规划</a>
  </div>
</nav>

<div class="main" style="max-width:900px">

  <div class="page-header">
    <div class="page-title">📅 月度对账</div>
    <div class="page-sub">对比每月实际收支与计划目标，追踪执行进度</div>
  </div>

  <!-- 选择客户 + 月份 -->
  <div class="card gb" style="margin-bottom:20px">
    <div class="frow">
      <div class="fg">
        <label>选择客户档案</label>
        <select id="sel-client">
          <option value="">— 选择已有客户 —</option>
        </select>
      </div>
      <div class="fg">
        <label>对账月份</label>
        <input type="month" id="sel-month"/>
      </div>
      <div class="fg" style="align-self:flex-end">
        <button class="btn btn-gold" onclick="loadClientData()">加载计划数据</button>
      </div>
    </div>
  </div>

  <!-- 计划 vs 实际 -->
  <div class="card gb" style="margin-bottom:20px">
    <div class="card-title"><span class="ico">📊</span> 收支对比</div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px">
      <div style="padding:16px;background:rgba(201,168,76,0.06);border:1px solid rgba(201,168,76,0.2);border-radius:12px">
        <div style="font-size:12px;color:var(--gold);font-weight:600;margin-bottom:12px">💰 收入</div>
        <div class="frow" style="margin-bottom:10px">
          <div class="fg"><label style="font-size:11px;color:var(--text3)">主动收入（计划）</label><div class="unit"><input type="number" id="p-active" placeholder="0"/><span class="uf">/月</span></div></div>
          <div class="fg"><label style="font-size:11px;color:var(--text3)">主动收入（实际）</label><div class="unit"><input type="number" id="a-active" placeholder="0"/><span class="uf">/月</span></div></div>
        </div>
        <div class="frow">
          <div class="fg"><label style="font-size:11px;color:var(--text3)">被动收入（计划）</label><div class="unit"><input type="number" id="p-passive" placeholder="0"/><span class="uf">/月</span></div></div>
          <div class="fg"><label style="font-size:11px;color:var(--text3)">被动收入（实际）</label><div class="unit"><input type="number" id="a-passive" placeholder="0"/><span class="uf">/月</span></div></div>
        </div>
      </div>

      <div style="padding:16px;background:rgba(224,85,85,0.06);border:1px solid rgba(224,85,85,0.2);border-radius:12px">
        <div style="font-size:12px;color:var(--red);font-weight:600;margin-bottom:12px">💸 支出</div>
        <div class="frow" style="margin-bottom:10px">
          <div class="fg"><label style="font-size:11px;color:var(--text3)">刚性支出（计划）</label><div class="unit"><input type="number" id="p-essential" placeholder="0"/><span class="uf">/月</span></div></div>
          <div class="fg"><label style="font-size:11px;color:var(--text3)">刚性支出（实际）</label><div class="unit"><input type="number" id="a-essential" placeholder="0"/><span class="uf">/月</span></div></div>
        </div>
        <div class="frow">
          <div class="fg"><label style="font-size:11px;color:var(--text3)">弹性支出（计划）</label><div class="unit"><input type="number" id="p-flex" placeholder="0"/><span class="uf">/月</span></div></div>
          <div class="fg"><label style="font-size:11px;color:var(--text3)">弹性支出（实际）</label><div class="unit"><input type="number" id="a-flex" placeholder="0"/><span class="uf">/月</span></div></div>
        </div>
        <div class="frow" style="margin-top:10px">
          <div class="fg"><label style="font-size:11px;color:var(--text3)">债务还款（计划）</label><div class="unit"><input type="number" id="p-debt" placeholder="0"/><span class="uf">/月</span></div></div>
          <div class="fg"><label style="font-size:11px;color:var(--text3)">债务还款（实际）</label><div class="unit"><input type="number" id="a-debt" placeholder="0"/><span class="uf">/月</span></div></div>
        </div>
      </div>
    </div>

    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button class="btn btn-ghost" onclick="clearForm()">清空</button>
      <button class="btn btn-gold" onclick="saveReconciliation()">💾 保存对账</button>
    </div>
  </div>

  <!-- 对账结果 -->
  <div id="result-panel" style="display:none" class="card gb" style="margin-bottom:20px">
    <div class="card-title"><span class="ico">📈</span> 对账结果</div>
    <div id="result-content"></div>
  </div>

  <!-- 历史对账记录 -->
  <div class="card gb">
    <div class="card-title"><span class="ico">📋</span> 历史记录 <span style="font-size:11px;color:var(--text2);font-weight:400;margin-left:8px">最近12条</span></div>
    <div id="history-list">
      <div style="text-align:center;color:var(--text2);font-size:13px;padding:30px">暂无对账记录</div>
    </div>
  </div>

</div>

<script src="assets/app.js"></script>
<script src="assets/storage.js"></script>
<script>
function toast(msg, type = 'success') {
  let wrap = el('toast');
  if (!wrap) { wrap = document.createElement('div'); wrap.id = 'toast'; document.body.appendChild(wrap); }
  const t = document.createElement('div');
  t.className = 'toast-item ' + type;
  t.innerHTML = (type === 'success' ? '✓' : '✕') + ' ' + msg;
  wrap.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// 初始化
document.addEventListener('DOMContentLoaded', () => {
  // 设置默认月份为当前月份
  const now = new Date();
  const mm = String(now.getMonth() + 1).padStart(2, '0');
  el('sel-month').value = `${now.getFullYear()}-${mm}`;

  // 加载客户列表
  const clients = getClients ? getClients() : [];
  const sel = el('sel-client');
  clients.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.id;
    opt.textContent = `${c.name}（${c.age || ''}岁）`;
    sel.appendChild(opt);
  });

  // 检查是否有预设的客户ID
  const presetClientId = sessionStorage.getItem('selectedClientId');
  if (presetClientId) {
    sessionStorage.removeItem('selectedClientId');
    sel.value = presetClientId;
    loadClientData();
  }

  renderHistory();
});

// 加载客户计划数据
function loadClientData() {
  const cid = el('sel-client').value;
  if (!cid) { toast('请先选择客户', 'error'); return; }
  const clients = getClients ? getClients() : [];
  const client = clients.find(c => c.id === cid);
  if (!client) { toast('未找到该客户', 'error'); return; }

  // 获取原始数据（数据存储在 raw 字段中）
  const raw = client.raw || client;
  const c = raw.currency || 'CNY';
  el('p-active').value = raw.activeIncome || 0;
  el('p-passive').value = raw.passiveIncome || 0;
  
  // 将 planner 的细项支出汇总到 monthly 的分类
  // 刚性支出 = 房贷 + 物业费 + 餐饮日用 + 交通 + 医疗 + 教育 + 保费
  const essentialExp = (raw.housing || 0) + (raw.propertyFee || 0) + 
                       (raw.daily || 0) + (raw.transport || 0) +
                       (raw.medical || 0) + (raw.education || 0) +
                       (raw.premiumExp || 0);
  el('p-essential').value = essentialExp;
  
  // 弹性支出 = 弹性消费 + 其他支出
  el('p-flex').value = (raw.flexExp || 0) + (raw.otherExp || 0);
  
  // 债务还款
  el('p-debt').value = raw.debtExp || 0;

  // 检查是否有该月的对账记录
  const month = el('sel-month').value;
  const key = `recon_${cid}_${month}`;
  const saved = localStorage.getItem(key);
  if (saved) {
    const existing = JSON.parse(saved);
    el('a-active').value = existing.aActive || '';
    el('a-passive').value = existing.aPassive || '';
    el('a-essential').value = existing.aEssential || '';
    el('a-flex').value = existing.aFlex || '';
    el('a-debt').value = existing.aDebt || '';
    toast(`已加载 ${month} 的对账记录`);
  } else {
    el('a-active').value = '';
    el('a-passive').value = '';
    el('a-essential').value = '';
    el('a-flex').value = '';
    el('a-debt').value = '';
  }
}

// 保存对账记录
function saveReconciliation() {
  const cid = el('sel-client').value;
  const month = el('sel-month').value;
  if (!cid || !month) { toast('请选择客户和月份', 'error'); return; }

  const record = {
    clientId: cid,
    month: month,
    pActive: g('p-active'),
    pPassive: g('p-passive'),
    aActive: g('a-active'),
    aPassive: g('a-passive'),
    pEssential: g('p-essential'),
    aEssential: g('a-essential'),
    pFlex: g('p-flex'),
    aFlex: g('a-flex'),
    pDebt: g('p-debt'),
    aDebt: g('a-debt'),
    savedAt: new Date().toISOString()
  };

  // 计算结果
  const pIncome = record.pActive + record.pPassive;
  const aIncome = record.aActive + record.aPassive;
  const pExp = record.pEssential + record.pFlex + record.pDebt;
  const aExp = record.aEssential + record.aFlex + record.aDebt;
  const pSurplus = pIncome - pExp;
  const aSurplus = aIncome - aExp;
  const pRate = pIncome > 0 ? (pSurplus / pIncome * 100).toFixed(1) : '0.0';
  const aRate = aIncome > 0 ? (aSurplus / aIncome * 100).toFixed(1) : '0.0';

  record.pIncome = pIncome; record.aIncome = aIncome;
  record.pExp = pExp; record.aExp = aExp;
  record.pSurplus = pSurplus; record.aSurplus = aSurplus;
  record.pRate = pRate; record.aRate = aRate;

  // 存储
  try {
    const key = `recon_${cid}_${month}`;
    localStorage.setItem(key, JSON.stringify(record));
    
    // 同时保存到客户档案
    if (typeof saveAnalysisResult === 'function') {
      saveAnalysisResult(cid, 'monthly', record);
    }
    
    toast(`已保存 ${month} 对账记录`);
    renderResult(record);
    renderHistory();
  } catch (e) {
    toast('保存失败', 'error');
  }
}

function renderResult(r) {
  const panel = el('result-panel');
  panel.style.display = 'block';
  const diff = (val, diff) => {
    const d = diff;
    return `<span style="color:${d > 0 ? 'var(--green)' : d < 0 ? 'var(--red)' : 'var(--text2)'};font-weight:600">${d > 0 ? '+' : ''}${fmt(d)}</span>`;
  };
  const clients = getClients ? getClients() : [];
  const client = clients.find(c => c.id === r.clientId);
  const c = client?.currency || 'CNY';

  panel.innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px">
      <div class="kpi"><div class="lbl">计划收入</div><div class="val c-green">${fmt(r.pIncome, c)}</div></div>
      <div class="kpi"><div class="lbl">实际收入</div><div class="val ${r.aIncome >= r.pIncome ? 'c-green' : 'c-red'}">${fmt(r.aIncome, c)}</div><div class="sub">${diff(r.aIncome, r.aIncome - r.pIncome)}</div></div>
      <div class="kpi"><div class="lbl">计划结余</div><div class="val ${r.pSurplus >= 0 ? 'c-green' : 'c-red'}">${fmt(r.pSurplus, c)}</div><div class="sub">储蓄率 ${r.pRate}%</div></div>
      <div class="kpi"><div class="lbl">实际结余</div><div class="val ${r.aSurplus >= 0 ? 'c-green' : 'c-red'}">${fmt(r.aSurplus, c)}</div><div class="sub">储蓄率 ${r.aRate}% ${diff(r.aSurplus, r.aSurplus - r.pSurplus)}</div></div>
    </div>

    <div style="margin-bottom:16px">
      <div style="font-size:12px;font-weight:600;color:var(--text3);margin-bottom:10px">执行进度</div>
      ${[
        { label: '收入执行率', p: r.pIncome, a: r.aIncome, good: 'higher' },
        { label: '支出控制率', p: r.pExp, a: r.aExp, good: 'lower' },
        { label: '结余达成率', p: Math.max(0, r.pSurplus), a: Math.max(0, r.aSurplus), good: 'higher' },
      ].map(item => {
        const rate = item.p > 0 ? Math.min(100, (item.a / item.p) * 100) : 0;
        const ok = item.good === 'higher' ? rate >= 90 : rate <= 110;
        const color = ok ? 'var(--green)' : rate < 70 || rate > 130 ? 'var(--red)' : 'var(--gold)';
        return `
          <div style="margin-bottom:10px">
            <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text3);margin-bottom:4px">
              <span>${item.label}</span><span style="color:${color}">${rate.toFixed(0)}%</span>
            </div>
            <div style="height:8px;background:var(--dark2);border-radius:99px;overflow:hidden">
              <div style="height:100%;width:${rate.toFixed(0)}%;background:${color};border-radius:99px"></div>
            </div>
          </div>
        `;
      }).join('')}
    </div>

    ${r.aSurplus < 0 ? `
      <div style="padding:12px;background:rgba(224,85,85,0.08);border:1px solid rgba(224,85,85,0.2);border-radius:10px;font-size:12px;color:var(--text2);line-height:1.7">
        ⚠️ 本月实际支出超过收入 ${fmt(Math.abs(r.aSurplus), c)}。建议审查弹性支出项目，找出超支原因并在下月调整。
      </div>
    ` : `
      <div style="padding:12px;background:rgba(62,207,142,0.08);border:1px solid rgba(62,207,142,0.2);border-radius:10px;font-size:12px;color:var(--text2);line-height:1.7">
        ✅ 本月结余 ${fmt(r.aSurplus, c)}，执行情况良好。继续保持！
      </div>
    `}
  `;
}

function renderHistory() {
  const list = el('history-list');
  const clients = getClients ? getClients() : [];
  const records = [];
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key.startsWith('recon_')) {
      try {
        records.push(JSON.parse(localStorage.getItem(key)));
      } catch (e) {}
    }
  }
  records.sort((a, b) => (b.month || '').localeCompare(a.month || ''));
  const top = records.slice(0, 12);

  if (top.length === 0) {
    list.innerHTML = '<div style="text-align:center;color:var(--text2);font-size:13px;padding:30px">暂无对账记录</div>';
    return;
  }

  list.innerHTML = `
    <div style="overflow-x:auto">
      <table style="width:100%;border-collapse:collapse;font-size:12px">
        <thead>
          <tr style="color:var(--text2)">
            <th style="text-align:left;padding:8px 12px;border-bottom:1px solid var(--border2)">月份</th>
            <th style="text-align:left;padding:8px 12px;border-bottom:1px solid var(--border2)">客户</th>
            <th style="text-align:right;padding:8px 12px;border-bottom:1px solid var(--border2)">计划收入</th>
            <th style="text-align:right;padding:8px 12px;border-bottom:1px solid var(--border2)">实际收入</th>
            <th style="text-align:right;padding:8px 12px;border-bottom:1px solid var(--border2)">计划结余</th>
            <th style="text-align:right;padding:8px 12px;border-bottom:1px solid var(--border2)">实际结余</th>
            <th style="text-align:center;padding:8px 12px;border-bottom:1px solid var(--border2)">状态</th>
          </tr>
        </thead>
        <tbody>
          ${top.map(r => {
            const client = clients.find(c => c.id === r.clientId);
            const c = client?.currency || 'CNY';
            const diff = r.aSurplus - r.pSurplus;
            const ok = r.aSurplus >= 0 && diff >= -r.pSurplus * 0.2;
            return `
              <tr style="border-bottom:1px solid var(--border2)" onmouseover="this.style.background='var(--dark3)'" onmouseout="this.style.background=''">
                <td style="padding:10px 12px;color:var(--text3)">${r.month}</td>
                <td style="padding:10px 12px">${client?.name || r.clientId}</td>
                <td style="padding:10px 12px;text-align:right;color:var(--text3)">${fmt(r.pIncome, c)}</td>
                <td style="padding:10px 12px;text-align:right;color:${r.aIncome >= r.pIncome ? 'var(--green)' : 'var(--red)'}">${fmt(r.aIncome, c)}</td>
                <td style="padding:10px 12px;text-align:right;color:${r.pSurplus >= 0 ? 'var(--green)' : 'var(--red)'}">${fmt(r.pSurplus, c)}</td>
                <td style="padding:10px 12px;text-align:right;font-weight:600;color:${r.aSurplus >= 0 ? 'var(--green)' : 'var(--red)'}">${fmt(r.aSurplus, c)}</td>
                <td style="padding:10px 12px;text-align:center"><span style="font-size:11px;padding:3px 8px;border-radius:99px;background:${ok ? 'rgba(62,207,142,0.15)' : 'rgba(224,85,85,0.15)'};color:${ok ? 'var(--green)' : 'var(--red)'}">${ok ? '✅ 达标' : '⚠️ 未达标'}</span></td>
              </tr>
            `;
          }).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function clearForm() {
  ['a-active','a-passive','a-essential','a-flex','a-debt'].forEach(id => el(id).value = '');
  el('result-panel').style.display = 'none';
}

// 初始化导航高亮
initNav('monthly');
</script>
</body>
</html>
